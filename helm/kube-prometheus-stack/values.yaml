grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - grafana.johnhopedawa.com
    tls:
      - hosts:
          - grafana.johnhopedawa.com
        secretName: cloudflare-origin-cert
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer
  admin:
    existingSecret: grafana-admin-secret
    userKey: username
    passwordKey: password

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
