name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  check-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      resume-api: ${{ steps.filter.outputs.resume-api }}
      metrics-api: ${{ steps.filter.outputs.metrics-api }}
      gcp-health-api: ${{ steps.filter.outputs.gcp-health-api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'website/frontend/**'
            api-gateway:
              - 'website/backend/api-gateway/**'
            resume-api:
              - 'website/backend/resume-api/**'
            metrics-api:
              - 'website/backend/metrics-api/**'
            gcp-health-api:
              - 'website/backend/gcp-health-api/**'

  build-and-push-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/overengineered-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./website/frontend
          file: ./website/frontend/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-frontend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-frontend:buildcache,mode=max

  build-and-push-api-gateway:
    name: Build & Push API Gateway
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.api-gateway == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/overengineered-api-gateway
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./website/backend/api-gateway
          file: ./website/backend/api-gateway/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-api-gateway:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-api-gateway:buildcache,mode=max

  build-and-push-resume-api:
    name: Build & Push Resume API
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.resume-api == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/overengineered-resume-api
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./website/backend/resume-api
          file: ./website/backend/resume-api/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-resume-api:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-resume-api:buildcache,mode=max

  build-and-push-metrics-api:
    name: Build & Push Metrics API
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.metrics-api == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/overengineered-metrics-api
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./website/backend/metrics-api
          file: ./website/backend/metrics-api/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-metrics-api:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-metrics-api:buildcache,mode=max

  build-and-push-gcp-health-api:
    name: Build & Push GCP Health API
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.gcp-health-api == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/overengineered-gcp-health-api
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./website/backend/gcp-health-api
          file: ./website/backend/gcp-health-api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-gcp-health-api:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/overengineered-gcp-health-api:buildcache,mode=max

  update-helm-tags:
    name: Update Helm Image Tags
    runs-on: ubuntu-latest
    needs:
      - build-and-push-frontend
      - build-and-push-api-gateway
      - build-and-push-resume-api
      - build-and-push-metrics-api
    if: |
      always() && (
        needs.build-and-push-frontend.result == 'success' ||
        needs.build-and-push-api-gateway.result == 'success' ||
        needs.build-and-push-resume-api.result == 'success' ||
        needs.build-and-push-metrics-api.result == 'success'
      )
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags
        run: |
          NEW_TAG="main-${GITHUB_SHA::7}"
          if [ "${{ needs.build-and-push-frontend.result }}" == "success" ]; then
            yq -i ".frontend.tag = \"${NEW_TAG}\"" helm/overengineered/values.yaml
          fi
          if [ "${{ needs.build-and-push-api-gateway.result }}" == "success" ]; then
            yq -i ".apiGateway.tag = \"${NEW_TAG}\"" helm/overengineered/values.yaml
          fi
          if [ "${{ needs.build-and-push-resume-api.result }}" == "success" ]; then
            yq -i ".resumeApi.tag = \"${NEW_TAG}\"" helm/overengineered/values.yaml
          fi
          if [ "${{ needs.build-and-push-metrics-api.result }}" == "success" ]; then
            yq -i ".metricsApi.tag = \"${NEW_TAG}\"" helm/overengineered/values.yaml
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/overengineered/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to main-${GITHUB_SHA::7}"
          git push
